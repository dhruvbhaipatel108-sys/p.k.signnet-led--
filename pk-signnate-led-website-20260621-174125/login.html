<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | P.K. Signnate LED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html"><span class="brand-mark">PK</span><span>P.K. Signnate LED</span></a>
    <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false"><span></span><span></span><span></span></button>
    <nav class="site-nav" aria-label="Primary navigation">
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="gallery.html">Gallery</a>
      <a href="contact.html">Contact Us</a>
      <a class="active" href="login.html">Login</a>
    </nav>
  </header>

  <main class="auth-shell">
    <section class="auth-card reveal" id="loginPanel">
      <p class="eyebrow">Login</p>
      <h1>Welcome back</h1>
      <p>Access customer enquiries, project updates, or saved quotation details.</p>
      <form class="login-form" id="loginForm">
        <label>Username or Email
          <input type="text" name="username" placeholder="username or email" required>
        </label>
        <label>Password
          <input type="password" name="password" placeholder="Enter password" required>
        </label>
        <div class="form-meta">
          <label class="check-label"><input type="checkbox" name="remember"> Remember Me</label>
          <a class="text-link" href="#">Forgot Password?</a>
        </div>
        <button class="btn primary full" type="submit">Login</button>
        <p class="form-status" id="loginStatus" aria-live="polite"></p>
      </form>
    </section>

    <section class="logout-card reveal" id="logoutPanel" hidden>
      <div class="logout-icon">OK</div>
      <p class="eyebrow">Logout</p>
      <h1>You are logged in</h1>
      <p id="logoutMessage">You can logout from this same page.</p>
      <div class="logout-actions">
        <button class="btn primary" type="button" id="logoutButton">Logout</button>
        <a class="btn light" href="index.html">Go Home</a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
